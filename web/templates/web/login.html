{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'web/css/auth.css' %}">
</head>

<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-header">
        <i class="bi bi-music-note-beamed auth-icon"></i>
        <h2>Bienvenido</h2>
        <p>Inicia sesión en tu cuenta</p>
      </div>

      {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
      {% endif %}

      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Tu usuario" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required>
          </div>
        </div>

        <button type="submit" class="btn btn-auth w-100">Iniciar sesión</button>
      </form>

      <div class="auth-footer">
        Entrar como admin <a href="{% url 'perfil_administrador' %}">Admin</a>
      </div>


      <div class="auth-footer">
        ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
