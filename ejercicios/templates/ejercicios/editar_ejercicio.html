{% extends 'base.html' %} <!-- Asegúrate de extender de tu base -->

{% block content %}
<div class="container my-5 text-white">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4">Editar Ejercicio</h2>
            <div class="card bg-dark text-white p-4 border-secondary">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título del Ejercicio</label>
                        <input type="text" class="form-control bg-secondary text-white border-0" id="titulo" name="titulo" value="{{ ejercicio.titulo }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control bg-secondary text-white border-0" id="descripcion" name="descripcion" rows="4">{{ ejercicio.descripcion }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'detalle_clase' clase.id %}" class="btn btn-outline-light">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
