{% extends 'web/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Crear Ejercicio Interactivo</h2>
    <hr>
    
    <div class="mb-3">
        <label class="form-label">Título del Ejercicio</label>
        <input type="text" id="titulo-ejercicio" class="form-control" placeholder="Ej. Acordes mayores y menores">
    </div>

    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea id="desc-ejercicio" class="form-control" placeholder="Instrucciones para el estudiante..."></textarea>
    </div>

    <hr>
    <h4>Preguntas</h4>
    <div id="contenedor-preguntas">
        {/* Aquí se inyectarán las tarjetas dinámicamente */}
    </div>

    <button type="button" class="btn btn-secondary mb-3" onclick="agregarPreguntaHTML()">+ Añadir Pregunta</button>
    <div>
        <button type="button" class="btn btn-primary btn-lg" onclick="guardarTodo()">Guardar Ejercicio</button>
    </div>
</div>

<script>
function agregarPreguntaHTML() {
    const contenedor = document.getElementById('contenedor-preguntas');
    const div = document.createElement('div');
    div.className = 'tarjeta-pregunta card p-3 mb-3 bg-dark text-white';
    div.innerHTML = `
        <div class="mb-2">
            <label class="form-label">Pregunta</label>
            <input type="text" class="pregunta-texto form-control" placeholder="Escribe la pregunta musical...">
        </div>
        <label class="form-label">Opciones (marca la casilla de la respuesta correcta)</label>
        <div class="opciones-container">
            <div class="input-group mb-2">
                <div class="input-group-text"><input type="checkbox" class="opcion-correcta" title="Marcar como correcta"></div>
                <input type="text" class="opcion-texto form-control" placeholder="Opción 1">
            </div>
            <div class="input-group mb-2">
                <div class="input-group-text"><input type="checkbox" class="opcion-correcta" title="Marcar como correcta"></div>
                <input type="text" class="opcion-texto form-control" placeholder="Opción 2">
            </div>
        </div>
    `;
    contenedor.appendChild(div);
}

function guardarTodo() {
    const titulo = document.getElementById('titulo-ejercicio').value;
    const descripcion = document.getElementById('desc-ejercicio').value;
    const tarjetas = document.querySelectorAll('.tarjeta-pregunta');
    
    let preguntas = [];

    tarjetas.forEach(tarjeta => {
        let textoPregunta = tarjeta.querySelector('.pregunta-texto').value;
        let opcionesInputs = tarjeta.querySelectorAll('.opcion-texto');
        let checkboxes = tarjeta.querySelectorAll('.opcion-correcta');
        
        let opciones = [];
        opcionesInputs.forEach((optInput, index) => {
            opciones.push({
                texto: optInput.value,
                es_correcta: checkboxes[index].checked
            });
        });

        preguntas.push({
            texto: textoPregunta,
            opciones: opciones
        });
    });

    // Enviar por fetch en formato JSON a Django
    fetch(window.location.href, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({ titulo, descripcion, preguntas })
    })
    .then(response => response.json())
    .then(data => {
        if(data.status === 'success') {
            alert(data.message);
            window.location.href = "{% url 'mis_clases' %}"; 
        } else {
            alert('Error: ' + data.message);
        }
    })
    .catch(error => console.error('Error:', error));
}
</script>
{% endblock %}
