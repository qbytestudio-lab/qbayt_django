{% extends 'web/base.html' %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="card bg-dark text-white p-4 mb-4 border-secondary">
        <h2>{{ ejercicio.titulo }}</h2>
        <p class="text-muted mb-0">{{ ejercicio.descripcion }}</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        
        {% for pregunta in ejercicio.preguntas.all %}
            <div class="card bg-dark text-white p-4 mb-3 border-secondary">
                <h5 class="mb-3">
                    <span class="badge bg-purple me-2">{{ forloop.counter }}</span> 
                    {{ pregunta.enunciado }}
                </h5>
                
                <div class="ms-3">
                    {% for opcion in pregunta.opciones.all %}
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="pregunta_{{ pregunta.id }}" value="{{ opcion.id }}" id="opcion_{{ opcion.id }}" required>
                            <label class="form-check-label text-light" for="opcion_{{ opcion.id }}">
                                {{ opcion.texto_opcion }}
                            </label>
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
            <i class="bi bi-send-fill"></i> Enviar Respuestas al Docente
        </button>
    </form>
</div>
{% endblock %}
