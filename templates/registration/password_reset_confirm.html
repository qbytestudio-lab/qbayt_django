{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva contraseña | QBYT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { background: #0f0f1a; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-auth { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; }
        .logo-box { background: #7c3aed; border-radius: 12px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 1rem; }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; }
        .form-control { background: #0f0f1a; border: 1px solid #2a2a3e; color: #fff; border-radius: 10px; padding: 0.75rem 1rem; }
        .form-control:focus { background: #0f0f1a; border-color: #7c3aed; color: #fff; box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
        .btn-primary { background: #7c3aed; border: none; border-radius: 10px; padding: 0.75rem; font-weight: 600; width: 100%; }
        .btn-primary:hover { background: #6d28d9; }
        .text-muted { color: #6b7280 !important; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card-auth">
        <div class="logo-box">🎵</div>
        <h1>Nueva contraseña</h1>
        <p class="text-muted mb-4">Ingresa tu nueva contraseña.</p>

        {% if validlink %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nueva contraseña</label>
                <input type="password" name="new_password1" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirmar contraseña</label>
                <input type="password" name="new_password2" class="form-control" required>
            </div>
            {% if form.errors %}
                <div class="alert alert-danger">{{ form.errors }}</div>
            {% endif %}
            <button type="submit" class="btn btn-primary">Guardar contraseña</button>
        </form>
        {% else %}
            <div class="alert alert-danger">El enlace no es válido o ya expiró. <a href="{% url 'password_reset' %}">Solicita uno nuevo</a>.</div>
        {% endif %}
    </div>
</body>
</html>
