{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Correo enviado — QBYT</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/recuperar.css' %}">
</head>
<body>

  <!-- Floating Particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Auth Wrapper -->
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Header -->
      <div class="auth-header">
        <div class="mail-success-icon">
          <div class="mail-icon-circle">
            <i class="bi bi-envelope-check-fill"></i>
          </div>
          <div class="success-sparkles">
            <span class="sparkle">✦</span>
            <span class="sparkle">✧</span>
            <span class="sparkle">✦</span>
          </div>
        </div>
        <h2>¡Correo enviado!</h2>
        <p>Revisa tu bandeja de entrada. Te hemos enviado un enlace para restablecer tu contraseña.</p>
      </div>

      <!-- Info Box -->
      <div class="info-box">
        <div class="info-box-icon">
          <i class="bi bi-info-circle-fill"></i>
        </div>
        <div class="info-box-content">
          <p class="info-box-title">Consejo</p>
          <p class="info-box-text">Si no encuentras el correo en tu bandeja principal, revisa la carpeta de <strong>spam</strong> o <strong>promociones</strong>.</p>
        </div>
      </div>

      <!-- Email Animation -->
      <div class="email-animation">
        <div class="email-icon-large">
          <i class="bi bi-envelope-fill"></i>
          <div class="email-send-effect"></div>
        </div>
      </div>

      <!-- Back Link -->
      <div class="back-link-container">
        <a href="{% url 'login' %}" class="back-link">
          <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
        </a>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
