{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contraseña restablecida | QBYT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { background: #0f0f1a; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-auth { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; }
        .text-muted { color: #6b7280 !important; }
        .btn-primary { background: #7c3aed; border: none; border-radius: 10px; padding: 0.75rem 1.5rem; font-weight: 600; }
        .btn-primary:hover { background: #6d28d9; }
    </style>
</head>
<body>
    <div class="card-auth">
        <div class="icon">✅</div>
        <h1>¡Listo!</h1>
        <p class="text-muted mt-2">Tu contraseña fue restablecida exitosamente.</p>
        <div class="mt-4">
            <a href="{% url 'login' %}" class="btn btn-primary">Iniciar sesión</a>
        </div>
    </div>
</body>
</html>
